
<style>
  .inn-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 12px; padding: 1rem 0; }
  .inn-card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 1.1rem 1.25rem; cursor: pointer; transition: border-color 0.15s; }
  .inn-card:hover { border-color: var(--color-border-secondary); }
  .inn-card.open { border-color: var(--color-border-primary); }
  .inn-tag { display: inline-block; font-size: 11px; font-weight: 500; padding: 3px 9px; border-radius: 99px; margin-bottom: 10px; }
  .inn-title { font-size: 15px; font-weight: 500; color: var(--color-text-primary); margin: 0 0 4px; }
  .inn-short { font-size: 13px; color: var(--color-text-secondary); margin: 0; line-height: 1.5; }
  .inn-body { font-size: 13px; color: var(--color-text-secondary); line-height: 1.6; margin-top: 12px; padding-top: 12px; border-top: 0.5px solid var(--color-border-tertiary); display: none; }
  .inn-card.open .inn-body { display: block; }
  .inn-effort { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
  .inn-pill { font-size: 11px; padding: 2px 8px; border-radius: 99px; border: 0.5px solid var(--color-border-tertiary); color: var(--color-text-secondary); }
  .toggle-hint { font-size: 11px; color: var(--color-text-tertiary); margin-top: 6px; display: block; }
  h2 { font-size: 13px; font-weight: 500; color: var(--color-text-secondary); margin: 0 0 12px; letter-spacing: 0.04em; text-transform: uppercase; }
</style>
<h2 style="padding-top:0.5rem">Software-only innovations — klik kartu untuk detail</h2>
<div class="inn-grid" id="grid"></div>
<script>
const items = [
  {
    tag: "Bug Fix → Feature", tagBg: "#FCEBEB", tagColor: "#A32D2D",
    title: "Auto-sync surat izin ke absensi",
    short: "Approve surat = otomatis isi status absen tanpa manual override.",
    body: "Buat <code>AbsenceRequestObserver</code> di Laravel. Saat <code>status</code> berubah jadi <code>approved</code>, observer otomatis melakukan upsert ke tabel <code>attendances</code> dengan status <code>sick</code> atau <code>permit</code> sesuai tipe pengajuan. Ini menutup celah fungsional paling kritis yang ada saat ini.",
    effort: "Low effort", impact: "High impact", label: "Wajib dikerjakan"
  },
  {
    tag: "Notifikasi", tagBg: "#E1F5EE", tagColor: "#0F6E56",
    title: "WhatsApp gateway ke orang tua",
    short: "Kirim pesan WA otomatis saat siswa tiba atau tidak hadir sampai batas waktu.",
    body: "Integrasikan <strong>Fonnte</strong> atau <strong>Nusabot</strong> (murah, cocok untuk Indonesia). Gunakan Laravel <code>Queue</code> + <code>Job</code> agar pengiriman tidak memperlambat respons API scan. Dua trigger: (1) scan berhasil → WA konfirmasi ke ortu, (2) scheduler jam 07:30 cek siswa yang belum scan sama sekali → WA peringatan ke ortu.",
    effort: "Medium effort", impact: "Very high impact", label: "Rekomendasi utama"
  },
  {
    tag: "Analytics", tagBg: "#E6F1FB", tagColor: "#185FA5",
    title: "Anomaly detection pola absensi",
    short: "Sistem otomatis flag siswa dengan pola mencurigakan ke dashboard guru.",
    body: "Buat Laravel <code>Command</code> yang dijadwalkan tiap Jumat malam via <code>Scheduler</code>. Analisis 3 pola: (1) terlambat 3x+ di hari yang sama dalam sebulan, (2) absen tanpa izin 2+ hari berturut-turut, (3) selisih check-in dan check-out terlalu cepat (indikasi titip kartu). Hasilnya masuk tabel <code>student_flags</code> dan muncul sebagai widget di dashboard guru.",
    effort: "Medium effort", impact: "High impact", label: "Nilai riset tinggi"
  },
  {
    tag: "UX Siswa", tagBg: "#FAEEDA", tagColor: "#854F0B",
    title: "Rekap absensi exportable PDF/Excel",
    short: "Guru & TU bisa unduh laporan per kelas per periode satu klik.",
    body: "Gunakan package <strong>Laravel Excel (Maatwebsite)</strong> untuk export <code>.xlsx</code> dan <strong>DomPDF/Browsershot</strong> untuk PDF. Buat halaman report builder: pilih kelas, pilih rentang tanggal, pilih kolom yang ditampilkan. Output tersedia dalam dua format. Ini adalah fitur yang paling sering diminta sekolah dalam penggunaan nyata.",
    effort: "Low-medium effort", impact: "High impact", label: "Kebutuhan operasional"
  },
  {
    tag: "Dashboard", tagBg: "#EEEDFE", tagColor: "#534AB7",
    title: "Heatmap & tren kehadiran Kepala Sekolah",
    short: "Visualisasi data historis: hari apa paling banyak absen, tren per bulan, ranking kelas.",
    body: "Gunakan <strong>ApexCharts</strong> (bisa via CDN, ringan). Tampilkan: (1) heatmap 7×52 mirip GitHub contribution graph tapi untuk kehadiran, (2) line chart tren per bulan dibandingkan tahun lalu, (3) bar chart ranking kehadiran antar kelas. Semua query bisa di-cache Redis/database dengan <code>Cache::remember()</code> agar tidak berat.",
    effort: "Medium effort", impact: "Medium-high impact", label: "Visual impact tinggi"
  },
  {
    tag: "Keamanan", tagBg: "#F1EFE8", tagColor: "#444441",
    title: "Rate limiting & IP whitelist API device",
    short: "Cegah eksploitasi token yang bocor dengan batasan request per menit.",
    body: "Tambahkan middleware <code>throttle:60,1</code> di route API device. Lebih baik lagi: tambahkan kolom <code>allowed_ip</code> di tabel <code>devices</code>. Saat request masuk, cocokkan IP pengirim dengan IP yang terdaftar. Jika tidak cocok, tolak meski token valid. Ini menutup celah keamanan di mana token yang bocor bisa dieksploitasi dari perangkat lain.",
    effort: "Low effort", impact: "High security impact", label: "Quick win keamanan"
  },
  {
    tag: "Gamifikasi", tagBg: "#FBEAF0", tagColor: "#993556",
    title: "Streak & leaderboard kehadiran siswa",
    short: "Siswa dapat badge dan poin untuk hadir tepat waktu berturut-turut.",
    body: "Tambahkan tabel <code>student_streaks</code> dan <code>student_points</code>. Setiap scan tepat waktu menambah streak. Putus jika absen tanpa izin. Badge milestone: 7 hari, 30 hari, 100 hari. Leaderboard per kelas di dashboard siswa. Ini meningkatkan engagement siswa secara signifikan — khususnya di level SMP/SMA.",
    effort: "Medium effort", impact: "High engagement", label: "Diferensiasi produk"
  },
  {
    tag: "Reliabilitas", tagBg: "#EAF3DE", tagColor: "#3B6D11",
    title: "Health monitoring & alert sistem",
    short: "Admin dapat notifikasi email/WA jika perangkat offline lebih dari X menit.",
    body: "Manfaatkan data heartbeat yang sudah ada. Buat <code>CheckDeviceHealth</code> command yang jalan tiap 5 menit via scheduler. Jika <code>last_seen_at</code> device lebih dari threshold (misal 10 menit), kirim alert ke email Admin. Threshold bisa dikonfigurasi per-device dari UI. Ini mengubah monitoring dari pasif (lihat dashboard) menjadi proaktif.",
    effort: "Low effort", impact: "High reliability", label: "Quick win monitoring"
  }
];

const grid = document.getElementById('grid');
items.forEach((item, i) => {
  const card = document.createElement('div');
  card.className = 'inn-card';
  card.innerHTML = `
    <span class="inn-tag" style="background:${item.tagBg};color:${item.tagColor}">${item.tag}</span>
    <p class="inn-title">${item.title}</p>
    <p class="inn-short">${item.short}</p>
    <span class="toggle-hint">Klik untuk detail implementasi</span>
    <div class="inn-body">
      ${item.body}
      <div class="inn-effort">
        <span class="inn-pill">${item.effort}</span>
        <span class="inn-pill">${item.impact}</span>
        <span class="inn-pill" style="background:var(--color-background-secondary)">${item.label}</span>
      </div>
    </div>`;
  card.addEventListener('click', () => {
    const isOpen = card.classList.contains('open');
    document.querySelectorAll('.inn-card').forEach(c => c.classList.remove('open'));
    if (!isOpen) card.classList.add('open');
  });
  grid.appendChild(card);
});
</script>
